version: '3.8'
services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./index.php:/var/www/html/index.php
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - php

php:
  build:
    context: .
    dockerfile: Dockerfile-php
  volumes:
    - ./index.php:/var/www/html/index.php
  depends_on:
    - db
    
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: toshiro
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data: